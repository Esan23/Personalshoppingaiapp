<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Trine — your AI shopping shortlist</title>
    <meta
      name="description"
      content="Ask in plain words and get three options back, each with a clear reason it made the cut. Decide in minutes instead of an evening. Free to start, no card required."
    />
    <meta name="theme-color" content="#2563EB" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trine — your AI shopping shortlist" />
    <meta
      property="og:description"
      content="Three confident options with reasons, instead of 22 open tabs. Get your evenings back."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Inter (body/UI) + DM Serif Display (headlines) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Set theme before paint to avoid flash of wrong mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("trine-theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
